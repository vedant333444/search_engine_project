<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced VR Search | Focus Corrected</title>
    <!-- (Stylesheets remain the same) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- (Header and Main Search sections remain the same) -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#"><i class="bi bi-headset-vr me-2"></i>VR Search</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="#">Contact Us</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">About Us</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow-1 d-flex align-items-center">
        <div class="container text-center">
            <div class="row justify-content-center">
                <div class="col-md-10 col-lg-8">
                    <h1 class="display-4 fw-bold mb-3">Discover Your Next Virtual World</h1>
                    <p class="lead mb-5">Search for the latest games, immersive experiences, and cutting-edge hardware.</p>
                    <form id="search-form" action="#" method="get" class="search-form mb-4">
                        <div class="input-group input-group-lg shadow-lg">
                            <input id="search-input" type="search" class="form-control" placeholder="Enter your search..." aria-label="Search" autocomplete="off" required>
                            <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Search</button>
                        </div>
                    </form>
                    <div id="autocomplete-suggestions" class="position-relative"></div>
                    <div id="shortcuts-container" class="mt-4">
                        <div id="shortcuts-button-container" class="d-flex justify-content-center align-items-center flex-wrap gap-2">
                            <button class="btn btn-sm btn-add-shortcut" title="Add a new shortcut"><i class="bi bi-plus-lg"></i> Add</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <section class="results-section py-5">
        <div class="container">
            <div id="search-results-container" class="row g-4"></div>
        </div>
    </section>

    <!-- ====================================================== -->
    <!--  NEW: Hidden Bootstrap Modal for Editing Shortcuts  -->
    <!-- ====================================================== -->
    <div class="modal fade" id="editShortcutModal" tabindex="-1" aria-labelledby="editShortcutModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="editShortcutModalLabel">Edit Shortcut</h1>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editShortcutForm">
                        <!-- Hidden input to store the ID of the shortcut being edited -->
                        <input type="hidden" id="modalShortcutId">
                        <div class="mb-3">
                            <label for="modalShortcutName" class="form-label">Shortcut Name</label>
                            <input type="text" class="form-control" id="modalShortcutName" required>
                        </div>
                        <div class="mb-3">
                            <label for="modalShortcutUrl" class="form-label">URL (Link)</label>
                            <input type="url" class="form-control" id="modalShortcutUrl" placeholder="https://example.com" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveShortcutChangesBtn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- (Scripts remain the same) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
