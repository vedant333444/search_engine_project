<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced VR Search | Focus Corrected</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    
    <!-- Bootstrap Icons (kept for the logo) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Fonts for a modern feel -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Header Navbar (Kept for full page structure) -->
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#"></i>VR Search</a>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="#">Contact Us</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">About Us</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content: Hero Search Section -->
    <main class="flex-grow-1 d-flex align-items-center">
        <div class="container text-center">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-7">
                    
                    <h1 class="display-4 fw-bold mb-3">Discover Your Next Virtual World</h1>
                    <p class="lead text-muted mb-5">
                        Search for the latest games, immersive experiences, and cutting-edge hardware.
                    </p>
                    
                    <!-- Search Form with Input Group -->
                    <form action="#" method="get" class="search-form">
                        <div class="input-group input-group-lg shadow-lg">
                            <!-- Input element: We ensure it takes the left-side rounded corners -->
                            <input type="search" class="form-control" placeholder="Enter your search..." aria-label="Search" required>
                            
                            <!-- Button element: We ensure it takes the right-side rounded corners -->
                            <button class="btn btn-primary custom-btn-gradient" type="submit">Search</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
